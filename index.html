<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Personal Finance Tracker</h1>
    
    <h2>Record an Expense</h2>

    <div class="input-row">
        <div>
            <label>Amount: </label>
            <input type="number" id="amount" placeholder="Amount"></input>
        </div>
        <div>
            <label>Category: </label>
            <select id="categorySelect" onChange="showOtherInput()">
                <option value="food">Food</option>
                <option value="travel">Travel</option>
                <option value="shopping">Shopping</option>
                <option value="others">Others</option>
            </select>
        </div>
    </div>

    <button class="btn" onclick="addExpense()">Add</button>
    
    <h2>Expenses</h2>
    <table class="card" id="expenseTable"></table>

    <h2>Total Spend</h2>
    <div class="chart-row">
        <canvas id="pieChart" width="400" height="400"></canvas>
    </div>
    
    <button class="btn" onclick="clearAll()">Clear All Expenses</button>
    
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
